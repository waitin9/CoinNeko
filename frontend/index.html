<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CoinNeko 記帳貓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F0; --card: #FFFFFF; --purple: #7C5CBF; --purple-light: #EDE8FA;
    --purple-dark: #5A3E9B; --gold: #F2A623; --gold-light: #FFF3DC; --green: #4CAF72;
    --green-light: #E8F7EE; --red: #E05C5C; --red-light: #FDEAEA; --text: #2D2240;
    --text-sub: #7A6E8A; --border: #EDE8FA; --shadow: 0 4px 20px rgba(124,92,191,0.08);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  h1,h2,h3 { font-family: 'Nunito', sans-serif; }

  /* --- LAYOUT --- */
  .app { display: flex; min-height: 100vh; flex-direction: column; }
  
  /* PC Sidebar */
  .sidebar { width: 220px; background: var(--purple); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: all 0.3s; }
  .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .sidebar-logo h1 { color: white; font-size: 20px; font-weight: 900; }
  .sidebar-logo span { font-size: 11px; color: rgba(255,255,255,0.6); }
  .sidebar nav { flex: 1; padding: 16px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all .2s; font-size: 14px; font-weight: 600; }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
  .nav-item.active { border-right: 3px solid var(--gold); }
  .nav-icon { font-size: 18px; }
  .user-bar { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.05); }
  .user-coins { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .coin-badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: white; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

  .main { margin-left: 220px; padding: 32px; flex: 1; width: calc(100% - 220px); transition: all 0.3s; }
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- GRID SYSTEM --- */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  /* --- COMPONENTS --- */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .stat-value { font-size: 24px; font-weight: 800; font-family: 'Nunito'; margin-top: 4px; }
  .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; transition: all .2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--purple); color: white; width: 100%; }
  .btn-gold { background: var(--gold); color: white; width: 100%; }

  /* --- MOBILE ADAPTATION --- */
  @media (max-width: 800px) {
    .sidebar { width: 100%; height: 70px; top: auto; bottom: 0; flex-direction: row; padding: 0; border-top: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo, .sidebar-logo span { display: none; }
    .sidebar nav { display: flex; padding: 0; width: 100%; height: 100%; }
    .nav-item { flex: 1; flex-direction: column; justify-content: center; padding: 8px 0; gap: 4px; font-size: 10px; border-right: none !important; }
    .nav-item.active { background: transparent; color: white; border-top: 4px solid var(--gold); }
    .user-bar { display: none; } /* 手機版使用者資訊隱藏或移位 */
    
    .main { margin-left: 0; padding: 16px 16px 90px 16px; width: 100%; }
    .stats-grid { grid-template-columns: 1fr; }
    .two-col-grid { grid-template-columns: 1fr; }
    .section-header h2 { font-size: 20px; }
    .cat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Cat Collection & Gacha Styles (保持原樣並微調手機顯示) */
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .cat-card { background: var(--card); border-radius: 14px; padding: 16px 12px; text-align: center; box-shadow: var(--shadow); }
  .cat-emoji { font-size: 40px; margin-bottom: 8px; }
  
  /* Modal responsive */
  .modal { width: 90%; max-width: 420px; padding: 24px; }

  /* Toast */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(80px); width: 80%; text-align: center; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>🐱 CoinNeko</h1>
      <span>記帳養貓 App</span>
    </div>
    <nav>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <span class="nav-icon">🏠</span><span>總覽</span>
      </div>
      <div class="nav-item" onclick="showPage('transactions')">
        <span class="nav-icon">📋</span><span>帳目</span>
      </div>
      <div class="nav-item" onclick="showPage('budget')">
        <span class="nav-icon">🎯</span><span>預算</span>
      </div>
      <div class="nav-item" onclick="showPage('collection')">
        <span class="nav-icon">🐾</span><span>圖鑑</span>
      </div>
      <div class="nav-item" onclick="showPage('gacha')">
        <span class="nav-icon">🎰</span><span>扭蛋</span>
      </div>
    </nav>
    <div class="user-bar">
      <div style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:700;" id="sidebar-username">載入中...</div>
      <div class="user-coins" id="user-coins-bar">
        <span class="coin-badge">🪙 <span id="coins-display">0</span></span>
        <span class="coin-badge">🎟️ <span id="tickets-display">0</span></span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="page active" id="page-dashboard">
      <div class="section-header">
        <h2>財務總覽</h2>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <span id="month-display"></span>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div style="font-size:12px;color:var(--text-sub);">本月收入</div>
          <div class="stat-value" id="stat-income" style="color:var(--green)">$0</div>
        </div>
        <div class="stat-card">
          <div style="font-size:12px;color:var(--text-sub);">本月支出</div>
          <div class="stat-value" id="stat-expense" style="color:var(--red)">$0</div>
        </div>
        <div class="stat-card">
          <div style="font-size:12px;color:var(--text-sub);">結餘</div>
          <div class="stat-value" id="stat-balance" style="color:var(--purple)">$0</div>
        </div>
      </div>
      <div class="two-col-grid">
        <div class="card">
          <h3 style="font-size:14px; margin-bottom:15px;">支出分類</h3>
          <div class="chart-bars" id="expense-chart"></div>
        </div>
        <div class="card">
          <h3 style="font-size:14px; margin-bottom:15px;">最近記錄</h3>
          <div id="recent-tx-list"></div>
        </div>
      </div>
    </div>

    <div class="page" id="page-transactions">
      <div class="section-header" style="flex-direction: column; align-items: flex-start; gap: 10px;">
        <h2>帳目記錄</h2>
        <button class="btn btn-primary" onclick="openAddModal()" style="width: auto;">＋ 新增記帳</button>
      </div>
      <div id="tx-list-container" style="margin-top:20px;"></div>
    </div>

    <div class="page" id="page-collection">
      <div class="section-header">
        <h2>🐾 貓咪圖鑑</h2>
        <span id="collection-count"></span>
      </div>
      <div class="cat-grid" id="cat-grid" style="margin-top:20px;"></div>
    </div>

    <div id="page-gacha" class="page" style="text-align:center;">
      <h2 style="font-size:26px;font-weight:900;">🎰 扭蛋機</h2>
      <div style="font-size:80px; margin:20px;">🏮</div>
      <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="stat-card"><div style="font-size:12px;">貓咪幣</div><div id="gacha-coins" style="font-weight:900; color:var(--gold);">0 🪙</div></div>
        <div class="stat-card"><div style="font-size:12px;">扭蛋券</div><div id="gacha-tickets" style="font-weight:900; color:var(--purple);">0 🎟️</div></div>
      </div>
      <button class="btn btn-primary" onclick="doPull(false)" style="margin-bottom:10px;">🎟️ 使用扭蛋券</button>
      <button class="btn btn-gold" onclick="doPull(true)">🪙 50 幣抽一次</button>
      <div id="gacha-result" class="card" style="display:none; margin-top:20px; animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);"></div>
    </div>
    
    <div class="page" id="page-budget">
      <div class="section-header">
        <h2>月度預算</h2>
        <button class="btn btn-primary" onclick="openBudgetModal()" style="width:auto;">＋ 設定預算</button>
      </div>
      <div id="budget-list-container" style="margin-top:20px;"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h3>新增記帳</h3>
    <div class="form-group"><label>金額</label><input type="number" id="tx-amount" placeholder="0"></div>
    <div class="form-group"><label>分類</label><select id="tx-category"></select></div>
    <div class="modal-footer">
      <button class="btn" style="background:#eee" onclick="closeModal('modal-add')">取消</button>
      <button class="btn btn-primary" onclick="submitTransaction()">確認記帳</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- 1. 多使用者 UUID 初始化 ---
if (!localStorage.getItem('userId')) {
  localStorage.setItem('userId', 'user-' + Math.random().toString(36).substr(2, 9));
}
const userId = localStorage.getItem('userId');
const API = '/api';
const headers = { 
  'Content-Type': 'application/json',
  'x-user-id': userId // 注入後端所需的 User ID [cite: 2026-03-24]
};

let currentMonth = new Date().toISOString().slice(0,7);
let currentUser = null;

// 通用 Fetch 封裝
async function fetchAPI(url, method = 'GET', body = null) {
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  const r = await fetch(API + url, options);
  return r.json();
}

// --- 2. 初始化與 API 串接 ---
async function init() {
  await loadUser();
  await loadCategories();
  updateMonthDisplay();
  loadDashboard();
}

async function loadUser() {
  currentUser = await fetchAPI('/user');
  document.getElementById('sidebar-username').textContent = currentUser.username;
  document.getElementById('coins-display').textContent = currentUser.coins;
  document.getElementById('tickets-display').textContent = currentUser.gacha_tickets;
  document.getElementById('gacha-coins').textContent = currentUser.coins + ' 🪙';
  document.getElementById('gacha-tickets').textContent = currentUser.gacha_tickets + ' 🎟️';
  if (currentUser.daily_reward) toast('🎁 每日獎勵：獲得 1 張扭蛋券！');
}

async function submitTransaction() {
  const category_id = document.getElementById('tx-category').value;
  const amount = document.getElementById('tx-amount').value;
  if (!amount) return toast('請輸入金額');
  const res = await fetchAPI('/transactions', 'POST', { category_id, amount });
  toast('記帳成功！+10幣');
  loadUser();
  loadDashboard();
  closeModal('modal-add');
}

async function doPull(useCoins) {
  const res = await fetchAPI('/gacha/pull', 'POST', { use_coins: useCoins });
  if (res.error) return toast('❌ ' + res.error);
  loadUser();
  const resDiv = document.getElementById('gacha-result');
  resDiv.style.display = 'block';
  resDiv.innerHTML = `<div class="cat-emoji">${res.cat.emoji}</div><h3>恭喜獲得 ${res.cat.name}！</h3><p>${res.cat.description}</p>`;
}

// --- 3. 頁面控制與 UI ---
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  event.currentTarget.classList.add('active');
  if (page === 'collection') loadCollection();
  if (page === 'transactions') loadTransactions();
}

async function loadCollection() {
  const [species, owned] = await Promise.all([fetchAPI('/cats/species'), fetchAPI('/cats/collection')]);
  const ownedMap = {}; owned.forEach(o => ownedMap[o.cat_species_id] = o);
  document.getElementById('cat-grid').innerHTML = species.map(s => {
    const own = ownedMap[s.id];
    return `<div class="cat-card ${own?'':'locked'}">
      <div class="cat-emoji">${s.emoji}</div>
      <div style="font-weight:800; font-size:13px;">${s.name}</div>
      ${own ? `<div style="color:var(--gold); font-size:10px;">${'★'.repeat(own.star_level)}</div>` : '<div style="font-size:10px; color:#999;">未獲得</div>'}
    </div>`;
  }).join('');
}

// 分類與其他載入邏輯 (簡化)
async function loadCategories() {
  const cats = await fetchAPI('/categories');
  document.getElementById('tx-category').innerHTML = cats.filter(c => c.type === 'expense').map(c => 
    `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function updateMonthDisplay() {
  const [y, m] = currentMonth.split('-');
  document.getElementById('month-display').textContent = `${y}/${m}`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function openAddModal() { document.getElementById('modal-add').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

init();
</script>
</body>
</html>
