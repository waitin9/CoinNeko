<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>CoinNeko 喵喵記帳</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #fff9f3;
      --primary: #ff9f68;
      --primary-dark: #ff7a3c;
      --card: #ffffff;
      --text-main: #333333;
      --text-sub: #777777;
      --border-radius-lg: 16px;
      --border-radius-md: 12px;
      --border-radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    .app-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 24px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    header h1 span.emoji {
      font-size: 26px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 14px;
      gap: 4px;
    }

    .user-info div {
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: 2fr 1.4fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--border-radius-lg);
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    h2.section-title {
      font-size: 18px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    h2.section-title .emoji {
      font-size: 20px;
    }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: #fff;
      transition: transform 0.05s ease, box-shadow 0.05s ease, background 0.15s ease;
      box-shadow: 0 2px 4px rgba(255,159,104,0.4);
      min-height: 36px;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .btn.secondary {
      background: #ffe1cc;
      color: #b45b24;
      box-shadow: none;
    }

    .btn.full-width {
      width: 100%;
      justify-content: center;
    }

    /* Gacha area */
    .gacha-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .gacha-info {
      font-size: 13px;
      color: var(--text-sub);
    }

    .gacha-stats {
      display: flex;
      gap: 8px;
      font-size: 13px;
      flex-wrap: wrap;
    }

    .gacha-stats span {
      background: #fff3e8;
      border-radius: 999px;
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .gacha-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 10px 0 0;
    }

    .gacha-actions .btn {
      font-size: 15px;
    }

    /* Cat gallery RWD grid */
    .cat-gallery-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .cat-card {
      background: #fff7f0;
      border-radius: var(--border-radius-md);
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-size: 13px;
    }

    .cat-card .emoji {
      font-size: 26px;
      margin-bottom: 4px;
    }

    .cat-card .name {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .cat-card .meta {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .cat-card .desc {
      font-size: 11px;
      color: var(--text-sub);
    }

    /* Transactions table */
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table th,
    .table td {
      padding: 6px 4px;
      border-bottom: 1px solid #f0e2d5;
      text-align: left;
    }

    .table th {
      font-weight: 600;
      color: var(--text-sub);
    }

    .table td.amount {
      text-align: right;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      border-radius: 999px;
      padding: 2px 8px;
      background: #f7f1ff;
      color: #5b3bb0;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1024px) {
      .cat-gallery-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 800px) {
      .cat-gallery-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      body {
        font-size: 14px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .user-info {
        align-items: flex-start;
      }

      header h1 {
        font-size: 20px;
      }

      header h1 span.emoji {
        font-size: 22px;
      }

      .btn {
        padding: 10px 14px;
        font-size: 15px;
        min-height: 40px;
      }

      .gacha-stats span {
        font-size: 12px;
      }

      .cat-gallery-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .cat-card .emoji {
        font-size: 24px;
      }

      .cat-card {
        padding: 10px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1><span class="emoji">🐱</span> CoinNeko 喵喵記帳</h1>
      <div class="user-info">
        <div id="user-name">喵喵理財師</div>
        <div>
          <span>貓咪幣：<span id="user-coins">0</span> 🪙</span>
          &nbsp;|&nbsp;
          <span>扭蛋券：<span id="user-tickets">0</span> 🎟️</span>
        </div>
      </div>
    </header>

    <main>
      <section class="card">
        <h2 class="section-title"><span class="emoji">📊</span> 財務總覽</h2>
        <div id="summary-section">
          <p>本月收入：<span id="summary-income">0</span></p>
          <p>本月支出：<span id="summary-expense">0</span></p>
          <p>結餘：<span id="summary-balance">0</span></p>
        </div>

        <h2 class="section-title"><span class="emoji">📒</span> 帳目記錄</h2>

        <!-- 你原本的記帳表單如果有，放在這個區塊上方 / 下方都可以，這裡暫時只保留表格 -->
        <table class="table" id="transactions-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>分類</th>
              <th>備註</th>
              <th class="amount">金額</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="transactions-body"></tbody>
        </table>
      </section>

      <section class="card">
        <h2 class="section-title"><span class="emoji">🐾</span> 貓咪圖鑑</h2>
        <div id="cat-gallery" class="cat-gallery-grid"></div>

        <h2 class="section-title"><span class="emoji">🎰</span> 扭蛋機</h2>
        <div class="gacha-header">
          <div class="gacha-info">
            每天登入送一次免費扭蛋券<br />
            完成每日記帳也可再拿扭蛋券<br />
            或用 50 貓咪幣抽卡
          </div>
          <div class="gacha-stats">
            <span>⭐ 普通 75%</span>
            <span>💙 稀有 20%</span>
            <span>💜 史詩 4.5%</span>
            <span>✨ 傳說 0.5%</span>
          </div>
        </div>

        <div class="gacha-actions">
          <button id="btn-pull-ticket" class="btn full-width">
            使用扭蛋券抽一次 🎟️
          </button>
          <button id="btn-pull-coins" class="btn secondary full-width">
            花費 50 貓咪幣抽一次 🪙
          </button>
        </div>

        <div id="gacha-result" style="margin-top:10px;font-size:13px;color:#555;"></div>
      </section>
    </main>
  </div>

  <script>
    // === 多使用者：localStorage + UUID ===
    const USER_ID_KEY = 'coinneko_user_id';

    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function getUserId() {
      let id = localStorage.getItem(USER_ID_KEY);
      if (!id) {
        id = generateUUID();
        localStorage.setItem(USER_ID_KEY, id);
      }
      return id;
    }

    const userId = getUserId();

    // 包裝 fetch，自動加 x-user-id
    function apiFetch(url, options = {}) {
      const headers = Object.assign(
        {},
        options.headers || {},
        { 'x-user-id': userId }
      );
      return fetch(url, { ...options, headers });
    }

    async function loadUser() {
      const res = await apiFetch('/api/user');
      const user = await res.json();
      document.getElementById('user-name').textContent = user.username || '喵喵理財師';
      document.getElementById('user-coins').textContent = user.coins ?? 0;
      document.getElementById('user-tickets').textContent = user.gacha_tickets ?? 0;
    }

    async function loadSummary() {
      const res = await apiFetch('/api/summary');
      const data = await res.json();
      document.getElementById('summary-income').textContent = data.income ?? 0;
      document.getElementById('summary-expense').textContent = data.expense ?? 0;
      document.getElementById('summary-balance').textContent = data.balance ?? 0;
    }

    async function loadTransactions() {
      const res = await apiFetch('/api/transactions');
      const list = await res.json();
      const tbody = document.getElementById('transactions-body');
      tbody.innerHTML = '';
      list.forEach(t => {
        const tr = document.createElement('tr');
        const d = new Date(t.transacted_at);
        const dateStr = d.toISOString().slice(0,10);
        tr.innerHTML = `
          <td>${dateStr}</td>
          <td>${t.cat_icon || ''} ${t.cat_name || ''}</td>
          <td>${t.note || ''}</td>
          <td class="amount">${t.amount}</td>
          <td><button data-id="${t.id}" class="btn secondary" style="padding:4px 8px;font-size:11px;min-height:26px;">刪除</button></td>
        `;
        tbody.appendChild(tr);
      });
      tbody.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-id]');
        if (!btn) return;
        const id = btn.getAttribute('data-id');
        await apiFetch('/api/transactions/' + id, { method: 'DELETE' });
        loadTransactions();
        loadSummary();
      }, { once: true });
    }

    async function loadCats() {
      const [speciesRes, collectionRes] = await Promise.all([
        apiFetch('/api/cats/species'),
        apiFetch('/api/cats/collection')
      ]);
      const species = await speciesRes.json();
      const collection = await collectionRes.json();
      const ownedMap = {};
      collection.forEach(c => { ownedMap[c.cat_species_id] = c; });

      const container = document.getElementById('cat-gallery');
      container.innerHTML = '';
      species.forEach(cat => {
        const owned = ownedMap[cat.id];
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.innerHTML = `
          <div class="emoji">${cat.emoji}</div>
          <div class="name">${cat.name}</div>
          <div class="meta">${cat.job_title} · ${cat.rarity}</div>
          <div class="desc">${cat.description || ''}</div>
          ${owned ? `<div style="margin-top:4px;font-size:11px;color:#b45b24;">已收藏 ★x${owned.star_level}</div>` : `<div style="margin-top:4px;font-size:11px;color:#ccc;">尚未獲得</div>`}
        `;
        container.appendChild(card);
      });
    }

    async function pullGacha(useCoins) {
      const res = await apiFetch('/api/gacha/pull', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ use_coins: useCoins })
      });
      const box = document.getElementById('gacha-result');
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        box.textContent = err.error || '抽卡失敗';
        return;
      }
      const data = await res.json();
      const cat = data.cat;
      box.textContent = `你抽到了 ${cat.emoji}「${cat.name}」(${cat.rarity})！` + (data.is_duplicate ? '（重複卡，已轉換成獎勵）' : '');
      document.getElementById('user-coins').textContent = data.user.coins;
      document.getElementById('user-tickets').textContent = data.user.gacha_tickets;
      loadCats();
    }

    document.getElementById('btn-pull-ticket').addEventListener('click', () => pullGacha(false));
    document.getElementById('btn-pull-coins').addEventListener('click', () => pullGacha(true));

    // 如果你原本有「新增交易表單」的 JS，記得把裡面的 fetch('/api/transactions', ...) 改成 apiFetch('/api/transactions', ...) 就好

    (async function init() {
      await loadUser();
      await loadSummary();
      await loadTransactions();
      await loadCats();
    })();
  </script>
</body>
</html>
