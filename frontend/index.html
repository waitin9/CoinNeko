<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinNeko 記帳貓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F0;
    --card: #FFFFFF;
    --purple: #7C5CBF;
    --purple-light: #EDE8FA;
    --purple-dark: #5A3E9B;
    --gold: #F2A623;
    --gold-light: #FFF3DC;
    --green: #4CAF72;
    --green-light: #E8F7EE;
    --red: #E05C5C;
    --red-light: #FDEAEA;
    --text: #2D2240;
    --text-sub: #7A6E8A;
    --border: #EDE8FA;
    --shadow: 0 4px 20px rgba(124,92,191,0.08);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3 { font-family: 'Nunito', sans-serif; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--purple); padding: 24px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 200; }
  .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .sidebar-logo h1 { color: white; font-size: 20px; font-weight: 900; }
  .sidebar-logo span { font-size: 11px; color: rgba(255,255,255,0.6); }
  .sidebar nav { flex: 1; padding: 16px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all .2s; font-size: 14px; font-weight: 600; }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
  .nav-item.active { border-right: 3px solid var(--gold); }
  .nav-icon { font-size: 18px; }
  .user-bar { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.15); }
  .user-coins { display: flex; gap: 8px; margin-top: 8px; }
  .coin-badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: white; display: flex; align-items: center; gap: 4px; }

  .main { margin-left: 220px; padding: 32px; flex: 1; }
  .page { display: none; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text-sub); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .stat-label { font-size: 12px; color: var(--text-sub); font-weight: 600; }
  .stat-value { font-size: 28px; font-weight: 800; font-family: 'Nunito', sans-serif; margin-top: 4px; }
  .stat-value.income { color: var(--green); }
  .stat-value.expense { color: var(--red); }
  .stat-value.balance { color: var(--purple); }

  /* TRANSACTIONS */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .section-header h2 { font-size: 22px; font-weight: 800; }
  .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; transition: all .2s; font-family: 'Nunito', sans-serif; }
  .btn-primary { background: var(--purple); color: white; }
  .btn-primary:hover { background: var(--purple-dark); transform: translateY(-1px); }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-ghost { background: transparent; border: 2px solid var(--border); color: var(--text-sub); }

  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--card); border-radius: 12px; box-shadow: var(--shadow); transition: transform .15s; }
  .tx-item:hover { transform: translateX(4px); }
  .tx-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-info { flex: 1; }
  .tx-name { font-weight: 700; font-size: 14px; }
  .tx-date { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .tx-amount { font-weight: 800; font-size: 15px; font-family: 'Nunito', sans-serif; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-del { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 16px; padding: 4px; opacity: 0.5; transition: opacity .2s; }
  .tx-del:hover { opacity: 1; color: var(--red); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border-radius: 20px; padding: 28px; width: 420px; max-width: 95vw; transform: translateY(20px); transition: transform .2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
  /* 1. 全域輸入框修正（字體改為 16px 防止 iOS 亂縮放，並解除原生綁定） */
  .form-group input, .form-group select { 
    width: 100%; 
    max-width: 100%;      
    box-sizing: border-box; 
    min-width: 0;         
    display: block;       
    padding: 12px 14px; 
    border: 2px solid var(--border); 
    border-radius: 10px; 
    font-size: 16px; /* 👉 關鍵防護 1：必須是 16px，iOS 點擊時才不會強制放大畫面 */
    font-family: inherit; 
    color: var(--text); 
    outline: none; 
    transition: border-color .2s; 
    background: var(--bg); 
    -webkit-appearance: none; /* 👉 關鍵防護 2：拔除蘋果原生的強制外觀與寬度 */
    appearance: none;
  }

  /* 2. 針對月份/日期的額外防護 */
  .form-group input[type="month"] {
    position: relative;
    overflow: hidden; /* 把超出的原生 UI 切掉 */
    background-color: var(--bg);
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--purple); }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
  .modal-footer .btn { flex: 1; }

  /* CAT COLLECTION */
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .cat-card { background: var(--card); border-radius: 14px; padding: 16px 12px; text-align: center; box-shadow: var(--shadow); transition: transform .2s; cursor: default; }
  .cat-card:hover { transform: translateY(-3px); }
  .cat-card.locked { opacity: 0.35; filter: grayscale(1); }
  .cat-emoji { font-size: 36px; margin-bottom: 8px; }
  .cat-name { font-weight: 800; font-size: 13px; font-family: 'Nunito', sans-serif; }
  .cat-job { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .rarity-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }
  .rarity-common { background: #EEE; color: #888; }
  .rarity-rare { background: #DCE8FA; color: #185FA5; }
  .rarity-epic { background: var(--purple-light); color: var(--purple); }
  .rarity-legendary { background: var(--gold-light); color: #8A5E00; }
  .stars { color: var(--gold); font-size: 11px; margin-top: 4px; letter-spacing: -1px; }

  /* GACHA */
  .gacha-center { max-width: 560px; margin: 0 auto; text-align: center; }
  .gacha-machine { font-size: 100px; margin: 20px 0; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .gacha-buttons { display: flex; gap: 12px; justify-content: center; margin: 24px 0; flex-wrap: wrap; }
  .gacha-result { background: var(--card); border-radius: 20px; padding: 32px; box-shadow: var(--shadow); margin: 20px 0; display: none; }
  .gacha-result.show { display: block; animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
  .result-emoji { font-size: 72px; margin-bottom: 12px; }

  /* BUDGET */
  .budget-list { display: flex; flex-direction: column; gap: 12px; }
  .budget-item { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
  .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .budget-label { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .budget-amounts { font-size: 12px; color: var(--text-sub); }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .progress-ok { background: var(--green); }
  .progress-warn { background: var(--gold); }
  .progress-over { background: var(--red); }

  /* CHART */
  .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 6px 6px 0 0; transition: height .5s ease; min-height: 4px; }
  .bar-label { font-size: 10px; color: var(--text-sub); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

  /* TOAST */
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--purple); color: white; padding: 14px 20px; border-radius: 14px; font-weight: 700; font-size: 14px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all .3s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* MONTH PICKER */
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .month-nav button { background: var(--purple-light); border: none; color: var(--purple); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; font-weight: 700; }
  .month-nav span { font-weight: 700; font-size: 15px; min-width: 80px; text-align: center; }

  .empty { text-align: center; padding: 40px; color: var(--text-sub); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  /* HAMBURGER */
  .hamburger { display: none; position: fixed; top: 14px; left: 14px; z-index: 300; background: var(--purple); border: none; border-radius: 10px; padding: 8px 10px; cursor: pointer; font-size: 20px; line-height: 1; color: white; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .sidebar-overlay.open { display: block; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .two-col-grid { grid-template-columns: 1fr; }
    .hamburger { display: block; }
    .sidebar { transform: translateX(-100%); transition: transform .25s ease; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 20px; padding-top: 60px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- HAMBURGER (mobile only) -->
  <button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>🐱 CoinNeko</h1>
      <span>記帳養貓 App</span>
    </div>
    <nav>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <span class="nav-icon">🏠</span><span>總覽</span>
      </div>
      <div class="nav-item" onclick="showPage('transactions')">
        <span class="nav-icon">📋</span><span>帳目</span>
      </div>
      <div class="nav-item" onclick="showPage('budget')">
        <span class="nav-icon">🎯</span><span>預算</span>
      </div>
      <div class="nav-item" onclick="showPage('collection')">
        <span class="nav-icon">🐾</span><span>圖鑑</span>
      </div>
      <div class="nav-item" onclick="showPage('gacha')">
        <span class="nav-icon">🎰</span><span>扭蛋</span>
      </div>
    </nav>
    <div class="user-bar">
      <div style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:700;" id="sidebar-username">載入中...</div>
      <div class="user-coins" id="user-coins-bar">
        <span class="coin-badge">🪙 <span id="coins-display">0</span></span>
        <span class="coin-badge">🎟️ <span id="tickets-display">0</span></span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="section-header">
        <h2>財務總覽</h2>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <span id="month-display"></span>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">本月收入</div>
          <div class="stat-value income" id="stat-income">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本月支出</div>
          <div class="stat-value expense" id="stat-expense">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">結餘</div>
          <div class="stat-value balance" id="stat-balance">$0</div>
        </div>
      </div>
      <div class="two-col-grid">
        <div class="card">
          <div class="card-title">支出分類</div>
          <div class="chart-bars" id="expense-chart"></div>
        </div>
        <div class="card">
          <div class="card-title">最近記錄</div>
          <div id="recent-tx-list"></div>
        </div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="page" id="page-transactions">
      <div class="section-header">
        <h2>帳目記錄</h2>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增記帳</button>
      </div>
      <div id="tx-list-container"></div>
    </div>

    <!-- BUDGET -->
    <div class="page" id="page-budget">
      <div class="section-header">
        <h2>月度預算</h2>
        <button class="btn btn-primary" onclick="openBudgetModal()">＋ 設定預算</button>
      </div>
      <div id="budget-list-container"></div>
    </div>

    <!-- COLLECTION -->
    <div class="page" id="page-collection">
      <div class="section-header">
        <h2>🐾 貓咪圖鑑</h2>
        <span id="collection-count" style="font-size:14px;color:var(--text-sub);font-weight:700;"></span>
      </div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <!-- GACHA -->
    <div class="page" id="page-gacha">
      <div class="gacha-center">
        <h2 style="font-size:26px;font-weight:900;">🎰 扭蛋機</h2>
        <p style="color:var(--text-sub);margin-top:8px;">完成每日記帳獲得扭蛋券，或用 50 貓咪幣抽卡</p>
        <div class="gacha-machine">🏮</div>
        <div style="display:flex;gap:20px;justify-content:center;margin-bottom:20px;">
          <div class="stat-card" style="text-align:center;padding:14px 24px;min-width:120px;">
            <div class="stat-label">貓咪幣</div>
            <div style="font-size:22px;font-weight:900;color:var(--gold);font-family:'Nunito',sans-serif;" id="gacha-coins">0 🪙</div>
          </div>
          <div class="stat-card" style="text-align:center;padding:14px 24px;min-width:120px;">
            <div class="stat-label">扭蛋券</div>
            <div style="font-size:22px;font-weight:900;color:var(--purple);font-family:'Nunito',sans-serif;" id="gacha-tickets">0 🎟️</div>
          </div>
        </div>
        <div class="gacha-buttons">
          <button class="btn btn-gold" style="padding:14px 28px;font-size:15px;" onclick="doPull(true)">🪙 用 50 幣抽卡</button>
          <button class="btn btn-primary" style="padding:14px 28px;font-size:15px;" onclick="doPull(false)">🎟️ 使用扭蛋券</button>
        </div>
        <div class="gacha-result" id="gacha-result"></div>
        <div class="card" style="margin-top:20px;text-align:left;">
          <div class="card-title">機率說明</div>
          <div style="font-size:13px;color:var(--text-sub);line-height:2;">
            ⭐ 普通 Common：75%<br>
            💙 稀有 Rare：20%<br>
            💜 史詩 Epic：4.5%<br>
            ✨ 傳說 Legendary：0.5%
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h3>新增記帳</h3>
    <div class="form-group">
      <label>類型</label>
      <select id="tx-type" onchange="filterCategories()">
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>
    </div>
    <div class="form-group">
      <label>分類</label>
      <select id="tx-category"></select>
    </div>
    <div class="form-group">
      <label>金額</label>
      <input type="number" id="tx-amount" placeholder="請輸入金額" min="0" step="1">
    </div>
    <div class="form-group">
      <label>備註（選填）</label>
      <input type="text" id="tx-note" placeholder="例如：午餐、台北捷運...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">取消</button>
      <button class="btn btn-primary" onclick="submitTransaction()">記帳 +10🪙</button>
    </div>
  </div>
</div>

<!-- BUDGET MODAL -->
<div class="modal-overlay" id="modal-budget">
  <div class="modal">
    <h3>設定月預算</h3>
    <div class="form-group">
      <label>支出分類</label>
      <select id="budget-category"></select>
    </div>
    <div class="form-group">
      <label>月份</label>
      <input type="month" id="budget-month">
    </div>
    <div class="form-group">
      <label>預算上限</label>
      <input type="number" id="budget-limit" placeholder="例如：5000">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-budget')">取消</button>
      <button class="btn btn-primary" onclick="submitBudget()">確認設定</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentMonth = new Date().toISOString().slice(0,7);
let allCategories = [];
let currentUser = null;

// Init
async function init() {
  await loadUser();
  await loadCategories();
  updateMonthDisplay();
  loadDashboard();
}

async function loadUser() {
  const r = await fetch(`${API}/user`);
  currentUser = await r.json();
  document.getElementById('sidebar-username').textContent = currentUser.username;
  document.getElementById('coins-display').textContent = currentUser.coins;
  document.getElementById('tickets-display').textContent = currentUser.gacha_tickets;
  document.getElementById('gacha-coins').textContent = currentUser.coins + ' 🪙';
  document.getElementById('gacha-tickets').textContent = currentUser.gacha_tickets + ' 🎟️';
}

async function loadCategories() {
  const r = await fetch(`${API}/categories`);
  allCategories = await r.json();
  filterCategories();
}

function filterCategories() {
  const type = document.getElementById('tx-type')?.value || 'expense';
  const sel = document.getElementById('tx-category');
  if (!sel) return;
  sel.innerHTML = allCategories.filter(c => c.type === type).map(c =>
    `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function updateMonthDisplay() {
  const [y, m] = currentMonth.split('-');
  document.getElementById('month-display').textContent = `${y}/${m}`;
}

function changeMonth(delta) {
  const d = new Date(currentMonth + '-01');
  d.setMonth(d.getMonth() + delta);
  currentMonth = d.toISOString().slice(0,7);
  updateMonthDisplay();
  loadDashboard();
  if (document.getElementById('page-transactions').classList.contains('active')) loadTransactions();
  if (document.getElementById('page-budget').classList.contains('active')) loadBudgets();
}

async function loadDashboard() {
  const r = await fetch(`${API}/summary?month=${currentMonth}`);
  const data = await r.json();
  document.getElementById('stat-income').textContent = '$' + data.income.toLocaleString();
  document.getElementById('stat-expense').textContent = '$' + data.expense.toLocaleString();
  const bal = data.balance;
  document.getElementById('stat-balance').textContent = (bal >= 0 ? '+$' : '-$') + Math.abs(bal).toLocaleString();
  renderExpenseChart(data.byCategory.filter(c => c.type === 'expense').slice(0, 6));
  loadRecentTransactions();
}

function renderExpenseChart(cats) {
  const container = document.getElementById('expense-chart');
  if (!cats.length) { container.innerHTML = '<p style="color:var(--text-sub);font-size:13px;padding:20px;">尚無支出資料</p>'; return; }
  const max = Math.max(...cats.map(c => c.total), 1);
  container.innerHTML = cats.map(c => {
    const pct = Math.max((c.total / max) * 100, 4);
    return `<div class="bar-wrap">
      <div class="bar" style="height:${pct}%;background:var(--purple-light);border:2px solid var(--purple);"></div>
      <div class="bar-label">${c.icon}</div>
      <div class="bar-label" style="font-size:9px;">${c.name}</div>
    </div>`;
  }).join('');
}

async function loadRecentTransactions() {
  const r = await fetch(`${API}/transactions?month=${currentMonth}`);
  const txs = await r.json();
  const container = document.getElementById('recent-tx-list');
  if (!txs.length) { container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>本月尚無記錄</p></div>'; return; }
  container.innerHTML = txs.slice(0, 5).map(tx => txItem(tx)).join('');
}

async function loadTransactions() {
  const r = await fetch(`${API}/transactions?month=${currentMonth}`);
  const txs = await r.json();
  const container = document.getElementById('tx-list-container');
  if (!txs.length) { container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>本月尚無帳目記錄<br>點右上角新增第一筆！</p></div>'; return; }
  container.innerHTML = '<div class="tx-list">' + txs.map(tx => txItem(tx, true)).join('') + '</div>';
}

function txItem(tx, showDel = false) {
  const isIncome = tx.cat_type === 'income';
  const amount = isIncome ? `+$${tx.amount.toLocaleString()}` : `-$${tx.amount.toLocaleString()}`;
  const cls = isIncome ? 'income' : 'expense';
  const bg = isIncome ? 'var(--green-light)' : 'var(--purple-light)';
  const date = tx.transacted_at.slice(0,10);
  const delBtn = showDel ? `<button class="tx-del" onclick="deleteTransaction('${tx.id}')">✕</button>` : '';
  return `<div class="tx-item">
    <div class="tx-icon" style="background:${bg};">${tx.cat_icon}</div>
    <div class="tx-info">
      <div class="tx-name">${tx.cat_name}${tx.note ? ' — ' + tx.note : ''}</div>
      <div class="tx-date">${date}</div>
    </div>
    <div class="tx-amount ${cls}">${amount}</div>
    ${delBtn}
  </div>`;
}

async function deleteTransaction(id) {
  if (!confirm('確定刪除此筆記錄？')) return;
  await fetch(`${API}/transactions/${id}`, { method: 'DELETE' });
  loadTransactions();
  loadDashboard();
  toast('已刪除記錄');
}

async function loadBudgets() {
  const r = await fetch(`${API}/budgets?month=${currentMonth}`);
  const budgets = await r.json();
  const container = document.getElementById('budget-list-container');
  if (!budgets.length) { container.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><p>尚未設定預算<br>點右上角開始設定月預算！</p></div>'; return; }
  container.innerHTML = '<div class="budget-list">' + budgets.map(b => {
    const pct = Math.min((b.spent / b.limit_amount) * 100, 100);
    const cls = pct < 70 ? 'progress-ok' : pct < 90 ? 'progress-warn' : 'progress-over';
    return `<div class="budget-item">
      <div class="budget-header">
        <div class="budget-label">${b.cat_icon} ${b.cat_name}</div>
        <div class="budget-amounts">$${b.spent.toLocaleString()} / $${b.limit_amount.toLocaleString()}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') + '</div>';
}

async function loadCollection() {
  const [speciesR, collectedR] = await Promise.all([
    fetch(`${API}/cats/species`), fetch(`${API}/cats/collection`)
  ]);
  const species = await speciesR.json();
  const collected = await collectedR.json();
  const collectedIds = new Set(collected.map(c => c.cat_species_id));
  const collectedMap = {};
  collected.forEach(c => collectedMap[c.cat_species_id] = c);
  document.getElementById('collection-count').textContent = `已收集 ${collectedIds.size} / ${species.length}`;
  document.getElementById('cat-grid').innerHTML = species.map(s => {
    const own = collectedMap[s.id];
    const locked = !own;
    const stars = own ? '★'.repeat(own.star_level) + '☆'.repeat(5 - own.star_level) : '';
    return `<div class="cat-card ${locked ? 'locked' : ''}">
      <div class="cat-emoji">${s.emoji}</div>
      <div class="cat-name">${s.name}</div>
      <div class="cat-job">${s.job_title}</div>
      <span class="rarity-badge rarity-${s.rarity}">${{common:'普通',rare:'稀有',epic:'史詩',legendary:'傳說'}[s.rarity]}</span>
      ${own ? `<div class="stars">${stars}</div>` : '<div style="font-size:10px;color:var(--text-sub);margin-top:4px;">未獲得</div>'}
    </div>`;
  }).join('');
}

// GACHA
async function doPull(useCoins) {
  const r = await fetch(`${API}/gacha/pull`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ use_coins: useCoins })
  });
  const data = await r.json();
  if (data.error) { toast('❌ ' + data.error); return; }
  const cat = data.cat;
  const rarityLabel = {common:'普通',rare:'稀有',epic:'史詩',legendary:'傳說'}[cat.rarity];
  const result = document.getElementById('gacha-result');
  result.className = 'gacha-result show';
  result.innerHTML = `
    <div class="result-emoji">${cat.emoji}</div>
    <span class="rarity-badge rarity-${cat.rarity}" style="font-size:13px;padding:4px 14px;">${rarityLabel}</span>
    <h3 style="margin-top:12px;font-size:22px;">${cat.name}</h3>
    <p style="color:var(--text-sub);margin-top:4px;">${cat.job_title}</p>
    <p style="color:var(--text-sub);font-size:13px;margin-top:8px;">${cat.description}</p>
    ${data.is_duplicate ? '<p style="color:var(--gold);font-weight:700;margin-top:12px;">✨ 重複！升星 +1 / 換取 30🪙</p>' : '<p style="color:var(--green);font-weight:700;margin-top:12px;">🎉 新貓咪加入圖鑑！</p>'}
  `;
  currentUser = data.user;
  document.getElementById('coins-display').textContent = currentUser.coins;
  document.getElementById('tickets-display').textContent = currentUser.gacha_tickets;
  document.getElementById('gacha-coins').textContent = currentUser.coins + ' 🪙';
  document.getElementById('gacha-tickets').textContent = currentUser.gacha_tickets + ' 🎟️';
}

// MODAL
function openAddModal() {
  filterCategories();
  document.getElementById('modal-add').classList.add('open');
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-note').value = '';
}

function openBudgetModal() {
  const sel = document.getElementById('budget-category');
  sel.innerHTML = allCategories.filter(c => c.type === 'expense').map(c =>
    `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  document.getElementById('budget-month').value = currentMonth;
  document.getElementById('budget-limit').value = '';
  document.getElementById('modal-budget').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function submitTransaction() {
  const category_id = document.getElementById('tx-category').value;
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const note = document.getElementById('tx-note').value;
  if (!amount || amount <= 0) { toast('請輸入有效金額'); return; }
  const r = await fetch(`${API}/transactions`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ category_id, amount, note })
  });
  const data = await r.json();
  closeModal('modal-add');
  currentUser = data.user;
  document.getElementById('coins-display').textContent = currentUser.coins;
  document.getElementById('tickets-display').textContent = currentUser.gacha_tickets;
  let msg = `記帳成功！+${data.coins_earned}🪙`;
  if (data.ticket_earned) msg += ' +1🎟️ 今日首筆獎勵！';
  toast(msg);
  loadDashboard();
  if (document.getElementById('page-transactions').classList.contains('active')) loadTransactions();
}

async function submitBudget() {
  const category_id = document.getElementById('budget-category').value;
  const month = document.getElementById('budget-month').value;
  const limit_amount = parseFloat(document.getElementById('budget-limit').value);
  if (!limit_amount || limit_amount <= 0) { toast('請輸入有效預算金額'); return; }
  await fetch(`${API}/budgets`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ category_id, month, limit_amount })
  });
  closeModal('modal-budget');
  toast('預算設定完成！');
  loadBudgets();
}

// NAV
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  event.currentTarget.classList.add('active');
  closeSidebar();
  if (page === 'transactions') loadTransactions();
  if (page === 'budget') loadBudgets();
  if (page === 'collection') loadCollection();
}

// SIDEBAR TOGGLE (mobile)
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// TOAST
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

init();
</script>
</body>
</html>
